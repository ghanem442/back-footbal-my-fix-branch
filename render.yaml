services:
  # Backend API Service
  - type: web
    name: football-booking-api
    env: node
    region: frankfurt # or oregon, singapore
    plan: free # or starter ($7/month)
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/src/main.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: football-booking-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
        sync: false
      - key: JWT_REFRESH_SECRET
        generateValue: true
        sync: false
      # Add other env vars manually in Render dashboard

databases:
  # PostgreSQL Database
  - name: football-booking-db
    databaseName: football_booking
    plan: free # 90 days free, then $7/month
    region: frankfurt
    postgresMajorVersion: 15
    # After creation, enable PostGIS:
    # 1. Go to database → Shell
    # 2. Run: CREATE EXTENSION IF NOT EXISTS postgis;

# Note: Render doesn't have free Redis
# Use external Redis (Upstash free tier):
# https://upstash.com/
